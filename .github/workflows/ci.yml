name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel an older run for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches the kirana-ml conda env used in development.
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Lint + Test (with Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # PostgreSQL service for the DB-backed tests under tests/db/.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kirana_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Repository tests pick this up; absence == DB tests skip.
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/kirana_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show installed versions
        run: |
          python --version
          pip show fastapi sqlalchemy pytest | grep -E "^(Name|Version):"

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Postgres not ready, sleeping..."
            sleep 1
          done

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term -ra

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14
