services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: kirana-backend:latest
    container_name: kirana-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKERS: ${WORKERS:-2}
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
      - kirana_logs:/app/logs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  kirana_logs:
