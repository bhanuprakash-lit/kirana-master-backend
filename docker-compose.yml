# Production docker-compose for Kirana Master Backend.
#
# Brings up two services:
#   - db:      PostgreSQL 16 with persistent volume
#   - backend: FastAPI app (uvicorn, 2 workers)
#
# Secrets (.env + serviceAccountKey.json) are mounted at runtime, never baked
# into the image. The backend auto-bootstraps the kirana_oltp schema on first
# boot via main.py lifespan -> KiranaRepository().

services:
  db:
    image: postgres:16-alpine
    container_name: kirana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lit_db}
    volumes:
      - kirana_pgdata:/var/lib/postgresql/data
    ports:
      # Expose only on loopback so the DB isn't reachable from the public iface.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: kirana-backend:latest
    container_name: kirana-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL inside the compose network so it points at the db service.
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-lit_db}
      WORKERS: ${WORKERS:-2}
    volumes:
      # Firebase admin SDK key — mounted, not baked.
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
      # Persist logs across container restarts (optional).
      - kirana_logs:/app/logs
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  kirana_pgdata:
  kirana_logs:
