[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Run DB-marked tests only when the suite is explicitly told to.
# Default `pytest` runs everything that isn't DB-tagged; CI overrides with `-m ""`.
markers =
    db: tests that need a real PostgreSQL (skipped unless TEST_DATABASE_URL is set)

addopts =
    -ra
    --strict-markers
    --strict-config

filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:apscheduler.*
